<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Library</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg">
        <symbol id="star-icon" viewBox="0 0 24 24">
            <path d="M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z"/>
        </symbol>
    </svg>
    
    <div>The Library</div>

    <div><button command="show-modal" commandfor="add-book">Add book</button></div>
    <dialog id="add-book">
        <button type=button id="dialog-close">X</button>
        <p>Testing testing</p>
        <form id="book-form">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" required>
            <span></span>

            <label for="author">Author:</label>
            <input type="text" id="author" name="author" required>

            <label for="pages">Total pages:</label>
            <input type="text" id="pages" name="pages" pattern="[0-9]+" required>

            <label for="status">Status:</label>
            <select id="status" name="status" required>
                <option value="to-read">To-Read</option>
                <option value="reading">Reading</option>
                <option value="read">Read</option>
            </select>

            <label for="start-date">Date started:</label>
            <input type="date" id="start-date" name="start-date" required>

            <label for="end-date">Date read:</label>
            <input type="date" id="end-date" name="end-date" required>

            <fieldset class="rating-group">
                <legend class="rating">Rating:</legend>
                
                <label>
                    <input type="radio" name="rating" value="1" required>
                    <span><svg class="star"><use href="#star-icon"></use></svg></span>
                </label>

                <label>
                    <input type="radio" name="rating" value="2">
                    <span><svg class="star"><use href="#star-icon"></use></svg></span>
                </label>

                <label>
                    <input type="radio" name="rating" value="3">
                    <span><svg class="star"><use href="#star-icon"></use></svg></span>
                </label>

                <label>
                    <input type="radio" name="rating" value="4">
                    <span><svg class="star"><use href="#star-icon"></use></svg></span>
                </label>

                <label>
                    <input type="radio" name="rating" value="5">
                    <span><svg class="star"><use href="#star-icon"></use></svg></span>
                </label>
            </fieldset>

            <input type="submit" value="Submit">
        </form>
    </dialog>
    
    <div class="books-list">
        <div class="headings">
            <div>Title</div>
            <div>Author</div>
            <div>Pages</div>
            <div>Status</div>
            <div>Date started</div>
            <div>Date read</div>
            <div>Rating</div>
            <div>Actions</div>
        </div>
        <div id="books-container">

        </div>
    </div>
</body>
</html>
